appId: gg.hydralauncher.hydra
productName: Hydra
directories:
  buildResources: build
extraResources:
  - ludusavi
  - hydra-python-rpc
  - hydra-native
  - seeds
  - from: node_modules/create-desktop-shortcuts/src/windows.vbs
  - from: resources/achievement.wav
files:
  - "!**/.vscode/*"
  - "!src/*"
  # Local dev tooling: direnv caches and Python venvs contain symlinks into
  # the nix store, which trips electron-builder's asar integrity check.
  - "!.direnv/**"
  - "!.venv*/**"
  - "!native/hydra-native/target"
  - "!native/hydra-native/target/**"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,tsconfig.test.json}"
  - "!scripts/register-ts-node.mjs"
asarUnpack:
  - resources/**
  - node_modules/sharp/**
  - node_modules/@img/sharp-libvips-*/**
win:
  executableName: Hydra
  extraResources:
    - from: binaries/7z.exe
    - from: binaries/7z.dll
  target:
    - nsis
    - portable
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
  include: installer.nsh
portable:
  artifactName: ${name}-${version}-portable.${ext}
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extraResources:
    - from: binaries/7zz
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  extraResources:
    - from: binaries/7zzs
    - from: binaries/umu/umu-run
  target:
    - AppImage
    - snap
    - deb
    - rpm
    - flatpak
  maintainer: electronjs.org
  category: Game
  mimeTypes:
    - x-scheme-handler/hydralauncher
appImage:
  artifactName: ${name}-${version}.${ext}
flatpak:
  artifactName: ${name}-${version}.${ext}
  runtime: org.freedesktop.Platform
  runtimeVersion: "23.08"
  sdk: org.freedesktop.Sdk
  base: org.electronjs.Electron2.BaseApp
  baseVersion: "23.08"
  branch: stable
  finishArgs:
    - --share=ipc
    - --share=network
    - --socket=x11
    - --socket=wayland
    - --socket=pulseaudio
    - --device=dri
    # Full host filesystem access is the default so user-picked download and
    # library folders are reached as native paths (no document-portal FUSE
    # overhead). Privacy-conscious users can tighten this with e.g.
    #   flatpak override --user --nofilesystem=host \
    #     --filesystem=xdg-download gg.hydralauncher.hydra
    # The portal/PathGrants plumbing still handles any folder reached that way.
    - --filesystem=host
    - --talk-name=org.freedesktop.Notifications
    - --talk-name=org.freedesktop.ScreenSaver
npmRebuild: false
publish:
  provider: github
  owner: hydralauncher
  repo: hydra
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/

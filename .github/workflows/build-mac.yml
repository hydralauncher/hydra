name: build-mac

on:
  workflow_dispatch:

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn build:mac
      - uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: dist/*.dmg

name: Trigger Landing Page Build

on:
  release:
    types: [published]

jobs:
  build:
    # Upstream infrastructure (secrets not available on this fork)
    if: github.repository == 'hydralauncher/hydra'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Landing Page build
        run: curl --location --request POST '${{ secrets.LP_TRIGGER_DEPLOY_URL }}'
